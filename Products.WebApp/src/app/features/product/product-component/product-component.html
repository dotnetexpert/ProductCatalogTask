<div class="page">
  <div class="page__top">
    <div>
      <div class="page__title">Products</div>
      <div class="page__sub">Manage your catalog</div>
    </div>
    <div class="page__actions">
      <button class="btn btn--primary addProduct" type="button" (click)="openCreate()" [disabled]="loading || saving">
        <svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" height="18" viewBox="0 0 24 24" width="18" data-name="Layer 1"><path d="m16 16a1 1 0 0 1 -1 1h-2v2a1 1 0 0 1 -2 0v-2h-2a1 1 0 0 1 0-2h2v-2a1 1 0 0 1 2 0v2h2a1 1 0 0 1 1 1zm6-5.515v8.515a5.006 5.006 0 0 1 -5 5h-10a5.006 5.006 0 0 1 -5-5v-14a5.006 5.006 0 0 1 5-5h4.515a6.958 6.958 0 0 1 4.95 2.05l3.484 3.486a6.951 6.951 0 0 1 2.051 4.949zm-6.949-7.021a5.01 5.01 0 0 0 -1.051-.78v4.316a1 1 0 0 0 1 1h4.316a4.983 4.983 0 0 0 -.781-1.05zm4.949 7.021c0-.165-.032-.323-.047-.485h-4.953a3 3 0 0 1 -3-3v-4.953c-.162-.015-.321-.047-.485-.047h-4.515a3 3 0 0 0 -3 3v14a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3z"/></svg>
        Add Product</button>
    </div>
  </div>

  <div class="alert" *ngIf="error">
    <div class="alert__title">Couldn’t load products</div>
    <div class="alert__sub">{{ error }}</div>
  </div>

  <div class="toast" *ngIf="toast" [class.toast--success]="toast.type === 'success'" [class.toast--error]="toast.type === 'error'">
    <div class="toast__msg">{{ toast.message }}</div>
    <button class="toast__x" type="button" (click)="closeToast()">×</button>
  </div>

  <app-generic-table
    [title]="'Product list'"
    [subtitle]="total ? (total + ' total') : 'Search, sort, and edit products'"
    [columns]="columns"
    [data]="products"
    [loading]="loading"
    (action)="onTableAction($event)"
  />

  <div class="modal" *ngIf="editOpen" >
    <div class="modal__panel" (click)="$event.stopPropagation()">
      <div class="modal__head">
        <div class="modal__title">{{ editRow ? 'Edit Product' : 'Create Product' }}</div>
        <button class="iconBtn" type="button" (click)="closeEdit()" [disabled]="saving">×</button>
      </div>

      <div class="form">
        <label class="field">
          <div class="field__label">Name</div>
          <input #nameInput class="input" [(ngModel)]="form.name" [disabled]="saving" />
          <div class="field__error" *ngIf="formErrors.name">{{ formErrors.name }}</div>
        </label>

        <label class="field">
          <div class="field__label">Color</div>
          <input class="input" [(ngModel)]="form.color" [disabled]="saving" />
          <div class="field__error" *ngIf="formErrors.color">{{ formErrors.color }}</div>
        </label>

        <label class="field">
          <div class="field__label">Price</div>
          <input class="input" type="number" inputmode="decimal" [(ngModel)]="form.price" [disabled]="saving" />
          <div class="field__error" *ngIf="formErrors.price">{{ formErrors.price }}</div>
        </label>
      </div>

      <div class="modal__footer">
        <button class="btn btn--ghost" type="button" (click)="closeEdit()" [disabled]="saving">
          <svg xmlns="http://www.w3.org/2000/svg" id="Outline" viewBox="0 0 24 24" width="20" height="20"><path d="M18,6h0a1,1,0,0,0-1.414,0L12,10.586,7.414,6A1,1,0,0,0,6,6H6A1,1,0,0,0,6,7.414L10.586,12,6,16.586A1,1,0,0,0,6,18H6a1,1,0,0,0,1.414,0L12,13.414,16.586,18A1,1,0,0,0,18,18h0a1,1,0,0,0,0-1.414L13.414,12,18,7.414A1,1,0,0,0,18,6Z"/></svg>
          Cancel</button>
        <button class="btn btn--primary" type="button" (click)="saveEdit()" [disabled]="saving">
         <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" id="Capa_1" x="0px" y="0px" viewBox="0 0 507.506 507.506" style="enable-background:new 0 0 507.506 507.506;" xml:space="preserve" width="16" height="16">
<g>
	<path d="M163.865,436.934c-14.406,0.006-28.222-5.72-38.4-15.915L9.369,304.966c-12.492-12.496-12.492-32.752,0-45.248l0,0   c12.496-12.492,32.752-12.492,45.248,0l109.248,109.248L452.889,79.942c12.496-12.492,32.752-12.492,45.248,0l0,0   c12.492,12.496,12.492,32.752,0,45.248L202.265,421.019C192.087,431.214,178.271,436.94,163.865,436.934z"/>
</g>

</svg>
          <span *ngIf="!saving">
          
            Save</span>
          <span *ngIf="saving">Saving…</span>
        </button>
      </div>
    </div>
  </div>
</div>
